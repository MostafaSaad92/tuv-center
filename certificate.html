<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUV CENTER - Certificate Verification</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f7fb;
}
header{
    background:#0A2D73;
    color:#fff;
    padding:20px;
    text-align:center;
}
.container{
    max-width:900px;
    margin:30px auto;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}
table{
    width:100%;
    border-collapse:collapse;
}
td{
    padding:12px;
    border-bottom:1px solid #ddd;
}
.title{
    font-weight:bold;
    width:35%;
}
.valid{
    color:green;
    font-weight:bold;
}
.expired{
    color:red;
    font-weight:bold;
}
.button{
    display:inline-block;
    margin-top:20px;
    background:#0A2D73;
    color:#fff;
    padding:12px 25px;
    text-decoration:none;
    border-radius:8px;
}
</style>

</head>
<body>

<header>
<h1>TUV CENTER</h1>
<p>Certificate Verification</p>
</header>

<div class="container">

<h2 id="certTitle"></h2>

<table>

<tr><td class="title">Certificate No.</td><td id="certificateNumber"></td></tr>
<tr><td class="title">Equipment No.</td><td id="equipmentNo"></td></tr>
<tr><td class="title">Equipment</td><td id="equipment"></td></tr>
<tr><td class="title">Manufacturer</td><td id="manufacturer"></td></tr>
<tr><td class="title">Model</td><td id="model"></td></tr>
<tr><td class="title">Serial Number</td><td id="serialNumber"></td></tr>
<tr><td class="title">Capacity</td><td id="capacity"></td></tr>
<tr><td class="title">Inspection Date</td><td id="inspectionDate"></td></tr>
<tr><td class="title">Expiry Date</td><td id="expiryDate"></td></tr>
<tr><td class="title">Status</td><td id="status"></td></tr>

</table>

<a id="pdfLink" class="button" target="_blank">
View Original Certificate
</a>

</div>

<script>

const id=new URLSearchParams(location.search).get("id");

fetch("certificates.json")
.then(r=>r.json())
.then(data=>{

const cert=data.find(x=>x.id===id);

if(!cert){

document.body.innerHTML="<h1 style='text-align:center;margin-top:80px'>Certificate Not Found</h1>";

return;

}

document.getElementById("certTitle").innerText=cert.certificateNumber;
document.getElementById("certificateNumber").innerText=cert.certificateNumber;
document.getElementById("equipmentNo").innerText=cert.equipmentNo;
document.getElementById("equipment").innerText=cert.equipment;
document.getElementById("manufacturer").innerText=cert.manufacturer;
document.getElementById("model").innerText=cert.model;
document.getElementById("serialNumber").innerText=cert.serialNumber;
document.getElementById("capacity").innerText=cert.capacity;
document.getElementById("inspectionDate").innerText=cert.inspectionDate;
document.getElementById("expiryDate").innerText=cert.expiryDate;

document.getElementById("status").innerHTML=
cert.status=="VALID"
?'<span class="valid">VALID</span>'
:'<span class="expired">EXPIRED</span>';

document.getElementById("pdfLink").href=cert.pdf;

});

</script>

</body>
</html>
